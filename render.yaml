services:
  - type: web
    name: download-video-tiktok-be
    runtime: node
    repo: https://github.com/vanquyd647/download_video_tiktok_be
    plan: free
    branch: main
    buildCommand: npm ci && npm run setup:yt-dlp
    startCommand: npm start
    healthCheckPath: /api/healthz
    autoDeploy: true
    envVars:
      - key: CLIENT_ORIGIN
        value: "*"
      - key: YT_DLP_IMPERSONATE
        value: chrome
      - key: YT_DLP_CONCURRENT_FRAGMENTS
        value: "8"
      - key: YT_DLP_RETRIES
        value: "3"
      - key: YT_DLP_FRAGMENT_RETRIES
        value: "3"
      - key: YT_DLP_SLEEP_INTERVAL
        value: "5"
      - key: YT_DLP_MAX_SLEEP_INTERVAL
        value: "10"
      - key: YT_DLP_SLEEP_REQUESTS
        value: "1"
      - key: YOUTUBE_PO_TOKEN
        sync: false
      - key: YOUTUBE_COOKIES_TEXT
        sync: false
      - key: YOUTUBE_COOKIES_FILE
        value: /etc/secrets/youtube_cookies.txt
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_TIMEOUT_MS
        value: "15000"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: FEEDBACK_TO
        value: homequy001@gmail.com
