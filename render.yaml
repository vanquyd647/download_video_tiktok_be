services:
  - type: web
    name: download-video-tiktok-be
    runtime: node
    repo: https://github.com/vanquyd647/download_video_tiktok_be
    plan: free
    branch: main
    buildCommand: npm ci && npm run setup:yt-dlp
    startCommand: npm start
    healthCheckPath: /api/healthz
    autoDeploy: true
    envVars:
      - key: CLIENT_ORIGIN
        value: "*"
      - key: YT_DLP_IMPERSONATE
        value: chrome
      - key: YT_DLP_CONCURRENT_FRAGMENTS
        value: "8"
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_TIMEOUT_MS
        value: "15000"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: FEEDBACK_TO
        value: homequy001@gmail.com
